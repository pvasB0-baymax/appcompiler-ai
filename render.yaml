services:
  - type: web_service
    name: appcompiler-ai-backend
    env: python
    plan: free
    repo: https://github.com/pvasB0-baymax/appcompiler-ai
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./appcompiler.db
